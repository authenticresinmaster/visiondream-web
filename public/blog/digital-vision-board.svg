<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="폰 잠금화면 속 디지털 비전보드: 커리어·학습·건강·재정·관계">
  <rect width="880" height="400" rx="20" fill="#f4faf5"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">폰으로 만드는 디지털 비전보드</text>
  <text x="440" y="74" text-anchor="middle" fill="#2f8f4e" font-family="sans-serif" font-size="14" font-weight="700">매일 '눈에 담기'니까 선택이 달라진다</text>

  <!-- Phone with lock screen vision board -->
  <g>
    <rect x="360" y="108" width="160" height="252" rx="24" fill="#1a2332"/>
    <rect x="372" y="122" width="136" height="224" rx="14" fill="#eef6ef"/>
    <text x="440" y="150" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11" font-weight="700">9:41</text>
    <!-- 2x2 board grid -->
    <rect x="384" y="166" width="52" height="52" rx="8" fill="#2f8f4e"/>
    <text x="410" y="197" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">커리어</text>
    <rect x="444" y="166" width="52" height="52" rx="8" fill="#3f7cb3"/>
    <text x="470" y="197" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">학습</text>
    <rect x="384" y="226" width="52" height="52" rx="8" fill="#d99a00"/>
    <text x="410" y="257" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">건강</text>
    <rect x="444" y="226" width="52" height="52" rx="8" fill="#568a35"/>
    <text x="470" y="257" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">재정</text>
    <text x="440" y="308" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="11" font-weight="800">내 비전 한 문장</text>
    <text x="440" y="328" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="9">매일 잠금화면에서 만난다</text>
  </g>

  <!-- Left step -->
  <g>
    <circle cx="150" cy="180" r="26" fill="#2f8f4e"/>
    <text x="150" y="188" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">1</text>
    <text x="150" y="228" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">이미지 모으기</text>
    <text x="150" y="247" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">5대 영역 5~9장</text>
  </g>

  <!-- Mid-left step -->
  <g>
    <circle cx="150" cy="300" r="26" fill="#3f7cb3"/>
    <text x="150" y="308" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">2</text>
    <text x="150" y="348" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">한 장으로 배치</text>
  </g>

  <!-- Right step -->
  <g>
    <circle cx="730" cy="180" r="26" fill="#d99a00"/>
    <text x="730" y="188" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">3</text>
    <text x="730" y="228" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">잠금화면 설정</text>
    <text x="730" y="247" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">하루 90번 본다</text>
  </g>

  <g>
    <circle cx="730" cy="300" r="26" fill="#568a35"/>
    <text x="730" y="308" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">🌱</text>
    <text x="730" y="348" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">매일 실행</text>
  </g>
</svg>
