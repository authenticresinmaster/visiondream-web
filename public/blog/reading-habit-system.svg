<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="완독 강박 없이 하루 빼먹어도 책장째 덮지 않는 독서 시스템: 오늘 한 쪽, 이틀 연속만 피하기, 완벽주의 안전망">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="44" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">독서는 의지가 아니라 시스템이다</text>
  <text x="440" y="72" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="14" font-weight="700">완독 강박 없이, 하루 빼먹어도 책장째 덮지 않게</text>

  <g>
    <rect x="40" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="168" cy="142" r="22" fill="#3f7cb3"/>
    <text x="168" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">1</text>
    <text x="168" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">오늘 한 쪽</text>
    <text x="168" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">한 챕터는 3일에 꺼진다</text>
    <line x1="88" y1="230" x2="248" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="168" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">가장 바쁜 날에도 넘길 크기</text>
    <text x="168" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">한 쪽이면 오늘은 성공</text>
  </g>

  <g>
    <rect x="312" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="440" cy="142" r="22" fill="#7a6ca8"/>
    <text x="440" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">2</text>
    <text x="440" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">이틀 연속만 피하기</text>
    <text x="440" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">빠진 다음이 진짜 승부</text>
    <line x1="360" y1="230" x2="520" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="440" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">밀린 분량은 없는 셈</text>
    <text x="440" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">오늘 한 쪽부터 다시</text>
  </g>

  <g>
    <rect x="584" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="712" cy="142" r="22" fill="#568a35"/>
    <text x="712" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">3</text>
    <text x="712" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">완벽주의 안전망</text>
    <text x="712" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">밑줄도 완독도 의무 아님</text>
    <line x1="632" y1="230" x2="792" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="712" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">이번 달 예비일 2회</text>
    <text x="712" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">하루쯤은 괜찮게</text>
  </g>

  <text x="440" y="340" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="700">작심삼일은 극복하는 게 아니라, 하루 빼먹어도 이어지는 구조를 만드는 것</text>
  <text x="440" y="368" text-anchor="middle" fill="#8a97a8" font-family="sans-serif" font-size="13" font-weight="600">독서 = 완독 강박 아니라 연결 — 하루 빼먹어도 책장째 안 덮는 3단계</text>
</svg>
