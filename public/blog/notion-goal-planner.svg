<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="노션으로 만드는 연·월·주·오늘 연동 목표 계획표">
  <rect width="1200" height="630" rx="28" fill="#f2f8f3"/>
  <text x="600" y="86" text-anchor="middle" fill="#1a2e22" font-family="sans-serif" font-size="40" font-weight="800">연 → 월 → 주 → 오늘, 연동되는 계획표</text>
  <text x="600" y="132" text-anchor="middle" fill="#2f7d4f" font-family="sans-serif" font-size="22" font-weight="700">큰 목표 하나를 '오늘 할 일' 크기로 쪼개기</text>
  <defs>
    <marker id="ng" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto"><path d="M0,0 L12,7 L0,14 Z" fill="#2f7d4f"/></marker>
  </defs>
  <!-- Year -->
  <g>
    <rect x="120" y="200" width="960" height="78" rx="16" fill="#1a3e2a"/>
    <circle cx="176" cy="239" r="26" fill="#7bc48f"/>
    <text x="176" y="248" text-anchor="middle" fill="#0f2418" font-family="sans-serif" font-size="24" font-weight="800">연</text>
    <text x="232" y="232" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="800">연간 목표</text>
    <text x="232" y="262" fill="#c7e5cf" font-family="sans-serif" font-size="18">12월까지 10km 달리기</text>
  </g>
  <line x1="600" y1="278" x2="600" y2="318" stroke="#2f7d4f" stroke-width="4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ng)"/>
  <!-- Month -->
  <g>
    <rect x="200" y="322" width="800" height="72" rx="16" fill="#2f7d4f"/>
    <circle cx="252" cy="358" r="24" fill="#d6f0dd"/>
    <text x="252" y="366" text-anchor="middle" fill="#12492b" font-family="sans-serif" font-size="22" font-weight="800">월</text>
    <text x="304" y="352" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="800">월간 목표</text>
    <text x="304" y="380" fill="#e2f4e8" font-family="sans-serif" font-size="17">7월 · 쉬지 않고 3km 달리기</text>
  </g>
  <line x1="600" y1="394" x2="600" y2="430" stroke="#2f7d4f" stroke-width="4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ng)"/>
  <!-- Week -->
  <g>
    <rect x="280" y="434" width="640" height="66" rx="16" fill="#4fa06e"/>
    <circle cx="330" cy="467" r="22" fill="#eaf7ee"/>
    <text x="330" y="475" text-anchor="middle" fill="#1b5836" font-family="sans-serif" font-size="20" font-weight="800">주</text>
    <text x="378" y="461" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="800">주간 원씽</text>
    <text x="378" y="487" fill="#effaf2" font-family="sans-serif" font-size="16">이번 주 · 롱런 1.5km로 늘리기</text>
  </g>
  <line x1="600" y1="500" x2="600" y2="534" stroke="#2f7d4f" stroke-width="4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ng)"/>
  <!-- Today -->
  <g>
    <rect x="360" y="538" width="480" height="60" rx="16" fill="#e8a020"/>
    <circle cx="408" cy="568" r="20" fill="#fff3d6"/>
    <text x="408" y="575" text-anchor="middle" fill="#7a5300" font-family="sans-serif" font-size="18" font-weight="800">오늘</text>
    <text x="452" y="564" fill="#3d2a00" font-family="sans-serif" font-size="18" font-weight="800">오늘 할 일</text>
    <text x="452" y="587" fill="#5a3f00" font-family="sans-serif" font-size="15">공원 한 바퀴 조깅하기</text>
  </g>
</svg>
