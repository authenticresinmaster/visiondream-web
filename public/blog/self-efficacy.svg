<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="자기효능감의 4가지 원천: 성취경험 · 대리경험 · 언어적 설득 · 정서·신체 상태">
  <rect width="880" height="400" rx="20" fill="#0f2a4d"/>
