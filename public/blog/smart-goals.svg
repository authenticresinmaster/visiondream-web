<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="SMART 목표 5요소: 구체적 · 측정가능 · 달성가능 · 관련성 · 기한">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">막연한 소망을 SMART 목표로</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">'언젠가'를 '오늘 할 일'로 바꾸는 5가지</text>
  <defs>
    <marker id="smA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="138" y1="210" x2="752" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#smA)"/>
  <g>
    <circle cx="130" cy="210" r="30" fill="#1a2332"/>
    <text x="130" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">S</text>
    <text x="130" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">구체적</text>
    <text x="130" y="285" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">Specific</text>
  </g>
  <g>
    <circle cx="290" cy="210" r="30" fill="#105d9e"/>
    <text x="290" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">M</text>
    <text x="290" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">측정가능</text>
    <text x="290" y="285" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">Measurable</text>
  </g>
  <g>
    <circle cx="450" cy="210" r="30" fill="#3f7cb3"/>
    <text x="450" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">A</text>
    <text x="450" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">달성가능</text>
    <text x="450" y="285" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">Achievable</text>
