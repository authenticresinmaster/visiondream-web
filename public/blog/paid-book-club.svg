<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="유료독서모임 고르는 4기준: 목적 · 강제력 · 밀도 · 아웃풋">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="48" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">유료독서모임, 값이 아니라 구조를 산다</text>
  <text x="440" y="76" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="14" font-weight="700">돈은 동기를 사지만, 습관은 못 산다 — 등록 전 4가지 기준</text>
  <g>
    <rect x="52" y="120" width="182" height="150" rx="14" fill="#1a2332"/>
    <text x="143" y="168" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">1</text>
    <text x="143" y="203" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="800">목적</text>
    <text x="143" y="228" text-anchor="middle" fill="#b9c6d6" font-family="sans-serif" font-size="12">완독·토론·실행·교류</text>
    <text x="143" y="248" text-anchor="middle" fill="#b9c6d6" font-family="sans-serif" font-size="12">내 페인과 맞는가</text>
  </g>
  <g>
    <rect x="250" y="120" width="182" height="150" rx="14" fill="#3f7cb3"/>
    <text x="341" y="168" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">2</text>
    <text x="341" y="203" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="800">강제력</text>
    <text x="341" y="228" text-anchor="middle" fill="#dbe8f5" font-family="sans-serif" font-size="12">안 읽고 가면</text>
    <text x="341" y="248" text-anchor="middle" fill="#dbe8f5" font-family="sans-serif" font-size="12">티가 나는가</text>
  </g>
  <g>
    <rect x="448" y="120" width="182" height="150" rx="14" fill="#568a35"/>
    <text x="539" y="168" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">3</text>
    <text x="539" y="203" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="800">밀도</text>
    <text x="539" y="228" text-anchor="middle" fill="#dfeed3" font-family="sans-serif" font-size="12">인원 ÷ 시간 =</text>
    <text x="539" y="248" text-anchor="middle" fill="#dfeed3" font-family="sans-serif" font-size="12">내가 말할 시간</text>
  </g>
  <g>
    <rect x="646" y="120" width="182" height="150" rx="14" fill="#c78a2e"/>
    <text x="737" y="168" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">4</text>
    <text x="737" y="203" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="800">아웃풋</text>
    <text x="737" y="228" text-anchor="middle" fill="#f6e5c8" font-family="sans-serif" font-size="12">끝나고 손에</text>
    <text x="737" y="248" text-anchor="middle" fill="#f6e5c8" font-family="sans-serif" font-size="12">남는 게 있는가</text>
  </g>
  <text x="440" y="322" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">완독은 성과가 아니라 재료</text>
  <text x="440" y="352" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="13" font-weight="600">한 문장 → 이번 주 5분 행동 → 기존 습관에 붙이기</text>
</svg>
