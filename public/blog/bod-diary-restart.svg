<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="다이어리가 3일 만에 덮이는 세 지점: 빈칸 공포, 이월 부재, 되돌아볼 이유 없음">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="44" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">다이어리가 3일째에 덮이는 세 지점</text>
  <text x="440" y="72" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="14" font-weight="700">문제는 의지가 아니라, 빠진 하루를 처리하는 규칙이 없어서</text>

  <g>
    <rect x="40" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="168" cy="142" r="22" fill="#3f7cb3"/>
    <text x="168" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">1</text>
    <text x="168" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">빈칸 공포</text>
    <text x="168" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">안 한 날이 먼저 보임</text>
    <line x1="88" y1="230" x2="248" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="168" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">빠진 날은 사선 하나</text>
    <text x="168" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">채우지 않는다</text>
  </g>

  <g>
    <rect x="312" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="440" cy="142" r="22" fill="#7a6ca8"/>
    <text x="440" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">2</text>
    <text x="440" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">이월이 없다</text>
    <text x="440" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">어제 페이지에 갇힘</text>
    <line x1="360" y1="230" x2="520" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="440" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">못 한 것 딱 하나만</text>
    <text x="440" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">내일로 옮겨 적기</text>
  </g>

  <g>
    <rect x="584" y="100" width="256" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="712" cy="142" r="22" fill="#568a35"/>
    <text x="712" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">3</text>
    <text x="712" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">돌아볼 이유 없음</text>
    <text x="712" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">기록이 알려주지 않음</text>
    <line x1="632" y1="230" x2="792" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="712" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">주간 구석에 O/X 7칸</text>
    <text x="712" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">언제 무너지는지 보인다</text>
  </g>

  <text x="440" y="340" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="700">다이어리는 잘못이 없다 — 빠진 하루를 붙잡을 장치가 없었을 뿐</text>
  <text x="440" y="368" text-anchor="middle" fill="#8a97a8" font-family="sans-serif" font-size="13" font-weight="600">완성이 아니라 한 칸이면 충분합니다 — 이틀 연속만 피하면 이긴다</text>
</svg>
