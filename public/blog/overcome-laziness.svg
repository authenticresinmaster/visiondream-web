<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="게으름 극복 4단계: 신호 읽기 · 2분 규칙 · 마찰 줄이기 · 비전 연결">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">게으름은 성격이 아니라 신호다</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">다시 움직이게 하는 4단계</text>
  <defs>
    <marker id="lzA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="150" y1="200" x2="742" y2="200" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#lzA)"/>
  <g>
    <circle cx="140" cy="200" r="34" fill="#1a2332"/>
    <text x="140" y="209" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">1</text>
    <text x="140" y="260" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">신호 읽기</text>
    <text x="140" y="281" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">의욕·에너지 점검</text>
  </g>
  <g>
    <circle cx="330" cy="200" r="34" fill="#105d9e"/>
    <text x="330" y="209" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">2</text>
    <text x="330" y="260" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">2분 규칙</text>
    <text x="330" y="281" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">아주 작게 시작</text>
  </g>
  <g>
    <circle cx="550" cy="200" r="34" fill="#3f7cb3"/>
    <text x="550" y="209" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">3</text>
    <text x="550" y="260" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">마찰 줄이기</text>
    <text x="550" y="281" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">환경을 미리 정리</text>
  </g>
  <g>
    <circle cx="740" cy="200" r="34" fill="#568a35"/>
    <text x="740" y="209" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">4</text>
    <text x="740" y="260" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전 연결</text>
    <text x="740" y="281" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">방향으로 묶기</text>
  </g>
  <text x="440" y="344" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="13" font-weight="700">신호를 읽고 → 작게 시작하면, 게으름은 다시 움직임이 된다 🌱</text>
