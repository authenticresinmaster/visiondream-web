<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="작심삼일을 이기는 습관 4원리: 작게 시작 → 기존 습관에 붙이기 → 보이게 만들기 → 비전과 연결">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">작심삼일을 이기는 습관 4원리</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">의지가 아니라 '설계'가 습관을 지속시킨다</text>
  <defs>
    <marker id="hbA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="148" y1="210" x2="742" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#hbA)"/>
  <g>
    <circle cx="140" cy="210" r="32" fill="#1a2332"/>
    <text x="140" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">🐣</text>
    <text x="140" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">① 작게 시작</text>
    <text x="140" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">5분이면 충분</text>
  </g>
  <g>
    <circle cx="340" cy="210" r="32" fill="#105d9e"/>
    <text x="340" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">🔗</text>
    <text x="340" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">② 기존 습관에 붙이기</text>
    <text x="340" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">양치 후 → 한 동작</text>
  </g>
  <g>
    <circle cx="540" cy="210" r="32" fill="#568a35"/>
    <text x="540" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">🔥</text>
    <text x="540" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">③ 보이게 만들기</text>
    <text x="540" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">연속기록(스트릭)</text>
  </g>
  <g>
    <circle cx="740" cy="210" r="32" fill="#d99a00"/>
    <text x="740" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">🎯</text>
    <text x="740" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">④ 의미와 연결</text>
    <text x="740" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">꿈·비전과 잇기</text>
  </g>
  <text x="440" y="352" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="13">「두 번 연속은 빠지지 않는다」 — 한 번 무너져도 습관은 살아남는다</text>
</svg>
