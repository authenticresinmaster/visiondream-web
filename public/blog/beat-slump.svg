<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="무기력에서 빠져나오는 4단계: 멈춤 인정 · 2분 행동 · 환경 정비 · 비전 재연결">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">의욕이 0일 때, 다시 시동 거는 법</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">무기력은 고장이 아니라 '멈춘 엔진' — 작게 키를 돌리면 됩니다</text>
  <defs>
    <marker id="bsA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="158" y1="210" x2="728" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#bsA)"/>
  <g>
    <circle cx="150" cy="210" r="34" fill="#1a2332"/>
    <text x="150" y="218" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">1</text>
    <text x="150" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">멈춤 인정</text>
    <text x="150" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">"멈춰도 괜찮아"</text>
  </g>
  <g>
    <circle cx="340" cy="210" r="34" fill="#105d9e"/>
    <text x="340" y="218" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">2</text>
    <text x="340" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">2분 행동</text>
    <text x="340" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">신발만 신기</text>
  </g>
  <g>
    <circle cx="540" cy="210" r="34" fill="#3f7cb3"/>
    <text x="540" y="218" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">3</text>
    <text x="540" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">환경 정비</text>
    <text x="540" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">의지 말고 방을</text>
  </g>
  <g>
    <circle cx="720" cy="210" r="34" fill="#568a35"/>
    <text x="720" y="218" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">4</text>
    <text x="720" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전 재연결</text>
    <text x="720" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">'왜'에 다시 잇기</text>
  </g>
  <text x="440" y="350" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="13" font-weight="700">의욕은 시동의 원인이 아니라 결과 — 움직이면 따라옵니다 🌱</text>
</svg>
