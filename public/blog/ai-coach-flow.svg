<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="AI 코치 활용 흐름: 비전 한 문장 → AI 초안 → 내가 편집 → 오늘 할 일">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">AI 코치로 비전을 오늘 할 일까지</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">AI가 초안을 짜고, 결정은 내가 한다</text>
  <defs>
    <marker id="acA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="148" y1="210" x2="742" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#acA)"/>
  <g>
    <circle cx="140" cy="210" r="32" fill="#1a2332"/>
    <text x="140" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">✍️</text>
    <text x="140" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">① 비전 한 문장</text>
    <text x="140" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">되고 싶은 나</text>
  </g>
  <g>
    <circle cx="340" cy="210" r="32" fill="#105d9e"/>
    <text x="340" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">🤖</text>
    <text x="340" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">② AI 초안</text>
    <text x="340" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">꿈·목표 트리</text>
  </g>
  <g>
    <circle cx="540" cy="210" r="32" fill="#568a35"/>
    <text x="540" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">✏️</text>
    <text x="540" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">③ 내가 편집</text>
    <text x="540" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">내 것으로 수정</text>
  </g>
  <g>
    <circle cx="740" cy="210" r="32" fill="#d99a00"/>
    <text x="740" y="220" text-anchor="middle" font-family="sans-serif" font-size="24">✅</text>
    <text x="740" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">④ 오늘 할 일</text>
    <text x="740" y="292" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11.5">습관·계획 반영</text>
  </g>
</svg>
