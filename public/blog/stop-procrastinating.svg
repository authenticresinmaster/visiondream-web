<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="미루기를 이기는 시스템: 잘게 쪼개기 · 실패 복구 규칙 · 환경 설계">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="48" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">미루기, 의지가 아니라 시스템으로</text>
  <text x="440" y="76" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="14" font-weight="700">'나중에'를 '오늘 5분'으로 바꾸는 3가지</text>
  <defs>
    <marker id="spA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#568a35"/></marker>
  </defs>
  <line x1="180" y1="215" x2="712" y2="215" stroke="#568a35" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#spA)"/>
  <g>
    <circle cx="170" cy="215" r="40" fill="#1a2332"/>
    <text x="170" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">1</text>
    <text x="170" y="280" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">잘게 쪼개기</text>
    <text x="170" y="301" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">첫 걸음 5분 이하</text>
  </g>
  <g>
    <circle cx="446" cy="215" r="40" fill="#3f7cb3"/>
    <text x="446" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">2</text>
    <text x="446" y="280" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">실패 복구 규칙</text>
    <text x="446" y="301" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">하루 놓쳐도 내일 재개</text>
  </g>
  <g>
    <circle cx="722" cy="215" r="40" fill="#568a35"/>
    <text x="722" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">3</text>
    <text x="722" y="280" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">환경 설계</text>
    <text x="722" y="301" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">시작이 쉬운 선택 되게</text>
  </g>
  <text x="440" y="360" text-anchor="middle" fill="#8a97a8" font-family="sans-serif" font-size="13" font-weight="600">미루는 뇌 → 계속 굴러가는 시스템</text>
</svg>
