<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="회복탄력성 4단계: 흔들림 → 인정 → 작은 회복 → 비전 복귀">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">멘탈은 타고나는 게 아니라 기르는 근력</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">흔들려도 빨리 돌아오는 회복탄력성 4단계</text>
  <defs>
    <marker id="msA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="170" y1="212" x2="712" y2="212" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#msA)"/>
  <g>
    <circle cx="160" cy="212" r="34" fill="#1a2332"/>
    <text x="160" y="221" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">1</text>
    <text x="160" y="276" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">흔들림</text>
    <text x="160" y="296" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">감정의 파도가 밀려온다</text>
  </g>
  <g>
    <circle cx="345" cy="212" r="34" fill="#105d9e"/>
    <text x="345" y="221" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">2</text>
    <text x="345" y="276" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">인정</text>
    <text x="345" y="296" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">감정과 사실을 분리한다</text>
  </g>
  <g>
    <circle cx="530" cy="212" r="34" fill="#568a35"/>
    <text x="530" y="221" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">3</text>
    <text x="530" y="276" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">작은 회복</text>
    <text x="530" y="296" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">가장 작은 한 걸음을 뗀다</text>
  </g>
  <g>
    <circle cx="715" cy="212" r="34" fill="#d99a00"/>
    <text x="715" y="221" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">4</text>
    <text x="715" y="276" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전 복귀</text>
    <text x="715" y="296" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">가려던 방향으로 돌아온다</text>
  </g>
</svg>
