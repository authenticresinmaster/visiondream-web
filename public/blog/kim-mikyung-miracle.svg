<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="김미경식 미라클모닝을 지속시키는 3요소: 현실적 기상 · 보이는 책임 · 비전 연결">
  <defs>
    <linearGradient id="kmSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4e0"/>
      <stop offset="1" stop-color="#f5f8fb"/>
    </linearGradient>
    <marker id="kmA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#d99a00"/></marker>
  </defs>
  <rect width="880" height="400" rx="20" fill="url(#kmSky)"/>
  <circle cx="440" cy="150" r="46" fill="#ffd166" opacity="0.35"/>
  <circle cx="440" cy="150" r="30" fill="#f2a900"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">김미경식 미라클모닝, 나만의 루틴으로</text>
  <text x="440" y="74" text-anchor="middle" fill="#c07f00" font-family="sans-serif" font-size="14" font-weight="700">3일 만에 무너지지 않고 30일 가는 3가지</text>
  <line x1="150" y1="250" x2="730" y2="250" stroke="#d99a00" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#kmA)"/>
  <g>
    <circle cx="150" cy="250" r="34" fill="#d99a00"/>
    <text x="150" y="259" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">1</text>
    <text x="150" y="308" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">현실적 기상</text>
    <text x="150" y="329" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">무리한 5시보다 지킬 시간</text>
  </g>
  <g>
    <circle cx="440" cy="250" r="34" fill="#3f7cb3"/>
    <text x="440" y="259" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">2</text>
    <text x="440" y="308" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">보이는 책임</text>
    <text x="440" y="329" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">연속기록·체크로 증명</text>
  </g>
  <g>
    <circle cx="730" cy="250" r="34" fill="#568a35"/>
    <text x="730" y="259" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">3</text>
    <text x="730" y="308" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전 연결</text>
    <text x="730" y="329" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">이 아침은 어떤 미래를 위한가</text>
  </g>
  <text x="440" y="372" text-anchor="middle" fill="#8a97a8" font-family="sans-serif" font-size="12">시각이 아니라 루틴을 따라 하세요 · 비전드림</text>
</svg>
