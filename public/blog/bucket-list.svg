<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="버킷리스트 작성 4단계: 영역 나누기 · 구체적으로 · 기한·목표화 · 비전보드로">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">막연한 소망을 인생 버킷리스트로</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">100개를 쓰고 실제로 이루는 4단계</text>
  <defs>
    <marker id="blA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="170" y1="205" x2="712" y2="205" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#blA)"/>
  <g>
    <circle cx="160" cy="205" r="34" fill="#1a2332"/>
    <text x="160" y="214" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">1</text>
    <text x="160" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">영역 나누기</text>
    <text x="160" y="287" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">여행·건강·관계·배움</text>
  </g>
  <g>
    <circle cx="350" cy="205" r="34" fill="#105d9e"/>
    <text x="350" y="214" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">2</text>
    <text x="350" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">구체적으로</text>
    <text x="350" y="287" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">사진 찍을 한 장면</text>
  </g>
  <g>
    <circle cx="540" cy="205" r="34" fill="#3f7cb3"/>
    <text x="540" y="214" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">3</text>
    <text x="540" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">기한·목표화</text>
    <text x="540" y="287" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">올해 5개에 날짜를</text>
  </g>
  <g>
    <circle cx="722" cy="205" r="34" fill="#568a35"/>
    <text x="722" y="214" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800">4</text>
    <text x="722" y="266" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전보드로</text>
    <text x="722" y="287" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">매일 보이게 옮기기</text>
  </g>
  <text x="440" y="346" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="700">소망 100개 → 구체적인 장면 → 오늘의 습관 🌱</text>
