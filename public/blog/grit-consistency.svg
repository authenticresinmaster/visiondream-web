<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="끈기와 꾸준함: 작게 매일 · 흔들려도 재시작 · 연속 기록 · 비전이 연료">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">재능보다, 오래 하는 사람이 이긴다</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">끈기를 지탱하는 4가지 구조</text>
  <defs>
    <marker id="gc" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="150" y1="200" x2="740" y2="200" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#gc)"/>
  <g>
    <circle cx="140" cy="200" r="34" fill="#1a2332"/>
    <text x="140" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">🧱</text>
    <text x="140" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">작게 매일</text>
    <text x="140" y="282" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">나쁜 날도 못 막는 크기</text>
  </g>
  <g>
    <circle cx="340" cy="200" r="34" fill="#105d9e"/>
    <text x="340" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">↻</text>
    <text x="340" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">흔들려도 재시작</text>
    <text x="340" y="282" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">두 번은 거르지 않기</text>
  </g>
  <g>
    <circle cx="540" cy="200" r="34" fill="#3f7cb3"/>
    <text x="540" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">🔥</text>
    <text x="540" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">연속 기록</text>
    <text x="540" y="282" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">쌓이는 게 눈에 보이게</text>
  </g>
  <g>
    <circle cx="740" cy="200" r="34" fill="#568a35"/>
    <text x="740" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="26" font-weight="800">🌱</text>
    <text x="740" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="800">비전이 연료</text>
    <text x="740" y="282" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">지루한 반복에 이유를</text>
  </g>
  <text x="440" y="344" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="15" font-weight="700">폭발적 노력보다, 꾸준한 반복이 복리로 이긴다</text>
</svg>
