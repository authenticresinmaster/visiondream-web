<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="확언이 작동하는 흐름: 말 → 믿음 → 행동 → 정체성">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">확언은 마법이 아니라 도구입니다</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">말이 정체성과 행동을 바꾸는 4단계</text>
  <defs>
    <marker id="afA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="172" y1="210" x2="708" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#afA)"/>
  <g>
    <circle cx="160" cy="210" r="34" fill="#1a2332"/>
    <text x="160" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20">💬</text>
    <text x="160" y="226" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">말</text>
    <text x="160" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">확언</text>
    <text x="160" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">믿을 수 있게</text>
  </g>
  <g>
    <circle cx="346" cy="210" r="34" fill="#105d9e"/>
    <text x="346" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20">🌱</text>
    <text x="346" y="226" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">믿음</text>
    <text x="346" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">믿음 (B)</text>
    <text x="346" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">자기인식 변화</text>
  </g>
  <g>
    <circle cx="532" cy="210" r="34" fill="#3f7cb3"/>
    <text x="532" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20">👟</text>
    <text x="532" y="226" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">행동</text>
    <text x="532" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">행동 (A)</text>
    <text x="532" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">오늘 작은 한 가지</text>
  </g>
  <g>
    <circle cx="718" cy="210" r="34" fill="#568a35"/>
    <text x="718" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20">🌳</text>
    <text x="718" y="226" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">정체성</text>
    <text x="718" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">정체성</text>
    <text x="718" y="291" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">반복이 곧 내가 됨</text>
  </g>
  <text x="440" y="350" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="13" font-weight="700">"나는 ~하는 사람이 되어가는 중" + 오늘의 행동 한 가지</text>
</svg>
