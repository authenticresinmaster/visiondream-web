<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="자기계발 첫 루틴 4단계: 작게 시작 · 하나만 · 비전 연결 · 매일 체크">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">자기계발, 어디서부터 시작할까</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">초보를 위한 첫 루틴 4단계</text>
  <defs>
    <marker id="ssA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="178" y1="210" x2="712" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#ssA)"/>
  <g>
    <circle cx="170" cy="210" r="34" fill="#1a2332"/>
    <text x="170" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">1</text>
    <text x="170" y="270" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">작게 시작</text>
    <text x="170" y="289" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">2분·1페이지</text>
  </g>
  <g>
    <circle cx="350" cy="210" r="34" fill="#105d9e"/>
    <text x="350" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">2</text>
    <text x="350" y="270" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">하나만</text>
    <text x="350" y="289" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">열 개 말고 한 개</text>
  </g>
  <g>
    <circle cx="530" cy="210" r="34" fill="#568a35"/>
    <text x="530" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">3</text>
    <text x="530" y="270" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">비전 연결</text>
    <text x="530" y="289" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">왜 하는가</text>
  </g>
  <g>
    <circle cx="710" cy="210" r="34" fill="#d99a00"/>
    <text x="710" y="219" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">4</text>
    <text x="710" y="270" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="13" font-weight="800">매일 체크</text>
    <text x="710" y="289" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">의지 대신 시스템</text>
  </g>
  <text x="440" y="350" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="13" font-weight="600">의지가 아니라 시스템이 당신을 움직인다</text>
</svg>
