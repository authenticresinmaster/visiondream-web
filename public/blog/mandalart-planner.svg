<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="만다라트 계획표: 3×3의 3×3 칸 — 한가운데 핵심 목표를 8개의 세부 목표가 둘러싸고, 각 세부 목표가 다시 8개의 구체적 행동으로 뻗어 나감">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="44" text-anchor="middle" fill="#0f2a4d" font-family="sans-serif" font-size="22" font-weight="800">목표 하나를 64개 행동으로</text>
  <text x="440" y="70" text-anchor="middle" fill="#f7931e" font-family="sans-serif" font-size="14" font-weight="700">오타니의 9×9 만다라트 계획표</text>
  <!-- 9x9 grid centered -->
  <g>
    <!-- geometry: cell 30px, 9x9 = 270px. origin x=305 y=95 -->
    <!-- shaded 8 sub-goal blocks (center of each surrounding 3x3) + core -->
    <!-- big square -->
    <rect x="305" y="95" width="270" height="270" rx="8" fill="#ffffff" stroke="#c7d4e3" stroke-width="1.5"/>
    <!-- thin cell lines -->
    <g stroke="#e4ebf3" stroke-width="1">
      <line x1="335" y1="95" x2="335" y2="365"/>
      <line x1="365" y1="95" x2="365" y2="365"/>
      <line x1="425" y1="95" x2="425" y2="365"/>
      <line x1="455" y1="95" x2="455" y2="365"/>
      <line x1="515" y1="95" x2="515" y2="365"/>
      <line x1="545" y1="95" x2="545" y2="365"/>
      <line x1="305" y1="125" x2="575" y2="125"/>
      <line x1="305" y1="155" x2="575" y2="155"/>
      <line x1="305" y1="215" x2="575" y2="215"/>
      <line x1="305" y1="245" x2="575" y2="245"/>
      <line x1="305" y1="305" x2="575" y2="305"/>
      <line x1="305" y1="335" x2="575" y2="335"/>
    </g>
    <!-- 8 sub-goal centers (light orange) -->
    <g fill="#fde3c4">
      <rect x="335" y="125" width="30" height="30"/>
      <rect x="425" y="125" width="30" height="30"/>
      <rect x="515" y="125" width="30" height="30"/>
      <rect x="335" y="215" width="30" height="30"/>
      <rect x="515" y="215" width="30" height="30"/>
      <rect x="335" y="305" width="30" height="30"/>
      <rect x="425" y="305" width="30" height="30"/>
      <rect x="515" y="305" width="30" height="30"/>
    </g>
    <!-- core goal center (navy) -->
    <rect x="425" y="215" width="30" height="30" fill="#0f2a4d"/>
    <!-- bold 3x3 block borders -->
    <g stroke="#1c4a7a" stroke-width="2" fill="none">
      <rect x="305" y="95" width="90" height="90"/>
      <rect x="395" y="95" width="90" height="90"/>
      <rect x="485" y="95" width="90" height="90"/>
      <rect x="305" y="185" width="90" height="90"/>
      <rect x="395" y="185" width="90" height="90"/>
      <rect x="485" y="185" width="90" height="90"/>
      <rect x="305" y="275" width="90" height="90"/>
      <rect x="395" y="275" width="90" height="90"/>
      <rect x="485" y="275" width="90" height="90"/>
    </g>
  </g>
  <!-- legend -->
  <g font-family="sans-serif">
    <rect x="628" y="150" width="18" height="18" fill="#0f2a4d"/>
    <text x="654" y="164" fill="#0f2a4d" font-size="13" font-weight="800">핵심 목표 1</text>
    <rect x="628" y="185" width="18" height="18" fill="#fde3c4" stroke="#f7931e" stroke-width="1"/>
    <text x="654" y="199" fill="#0f2a4d" font-size="13" font-weight="800">세부 목표 8</text>
    <rect x="628" y="220" width="18" height="18" fill="#ffffff" stroke="#c7d4e3" stroke-width="1.5"/>
    <text x="654" y="234" fill="#0f2a4d" font-size="13" font-weight="800">행동 64</text>
    <text x="628" y="272" fill="#5b6b82" font-size="11">세 번에 나눠</text>
    <text x="628" y="288" fill="#5b6b82" font-size="11">채운다</text>
  </g>
  <!-- left labels -->
  <g font-family="sans-serif">
    <text x="252" y="200" text-anchor="end" fill="#5b6b82" font-size="11">막연한</text>
    <text x="252" y="216" text-anchor="end" fill="#5b6b82" font-size="11">목표를</text>
    <text x="252" y="238" text-anchor="end" fill="#0f2a4d" font-size="12" font-weight="800">쪼갠다</text>
  </g>
</svg>
