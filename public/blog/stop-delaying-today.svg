<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="미루기의 4가지 유형 — 불안·지루·소진·혼란 — 과 유형별 처방">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="44" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">오늘 또 미뤘다면, 먼저 '유형'부터</text>
  <text x="440" y="72" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="14" font-weight="700">"그 일을 떠올릴 때, 내 몸은 뭘 느끼는가?"</text>

  <g>
    <rect x="40" y="100" width="192" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="136" cy="142" r="22" fill="#c0533f"/>
    <text x="136" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">1</text>
    <text x="136" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">불안형</text>
    <text x="136" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">가슴이 조인다</text>
    <line x1="72" y1="230" x2="200" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="136" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">처방</text>
    <text x="136" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">일부러 '망한 초안'</text>
  </g>

  <g>
    <rect x="248" y="100" width="192" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="344" cy="142" r="22" fill="#3f7cb3"/>
    <text x="344" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">2</text>
    <text x="344" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">지루형</text>
    <text x="344" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">"이거 의미 있나"</text>
    <line x1="280" y1="230" x2="408" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="344" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">처방</text>
    <text x="344" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">'왜'에 다시 연결</text>
  </g>

  <g>
    <rect x="456" y="100" width="192" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="552" cy="142" r="22" fill="#7a6ca8"/>
    <text x="552" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">3</text>
    <text x="552" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">소진형</text>
    <text x="552" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">텅 비고 무감각</text>
    <line x1="488" y1="230" x2="616" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="552" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">처방</text>
    <text x="552" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">밀지 말고 덜어내기</text>
  </g>

  <g>
    <rect x="664" y="100" width="192" height="196" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="760" cy="142" r="22" fill="#568a35"/>
    <text x="760" y="150" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">4</text>
    <text x="760" y="188" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="16" font-weight="800">혼란형</text>
    <text x="760" y="212" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">"어디부터 손대지"</text>
    <line x1="696" y1="230" x2="824" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="760" y="256" text-anchor="middle" fill="#568a35" font-family="sans-serif" font-size="12" font-weight="700">처방</text>
    <text x="760" y="277" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12.5">다음 '행동' 하나만</text>
  </g>

  <text x="440" y="340" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="14" font-weight="700">미루기 = 게으름이 아니라 감정 회피</text>
  <text x="440" y="368" text-anchor="middle" fill="#8a97a8" font-family="sans-serif" font-size="13" font-weight="600">유형 진단 → 맞는 처방 → 오늘 밤 5분 한 걸음</text>
</svg>
