<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="진로 비전보드: 직업 · 역량 · 시기 3칸으로 채우기">
  <defs>
    <linearGradient id="cvbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f8f1"/>
      <stop offset="1" stop-color="#e6f2e6"/>
    </linearGradient>
    <marker id="cvbArrow" markerWidth="14" markerHeight="14" refX="9" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#cvbBg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#ffffff" stroke="#c9e2c6" stroke-width="2"/>

  <text x="600" y="118" text-anchor="middle" fill="#1c3a1c" font-family="sans-serif" font-size="46" font-weight="800">진로·취업용 비전보드</text>
  <text x="600" y="164" text-anchor="middle" fill="#2e7d32" font-family="sans-serif" font-size="24" font-weight="700">감성 사진 말고, 세 칸을 '채우는' 보드</text>

  <!-- Job box -->
  <g>
    <rect x="96" y="222" width="304" height="300" rx="20" fill="#eaf5e8" stroke="#2e7d32" stroke-width="2.5"/>
    <circle cx="248" cy="286" r="34" fill="#2e7d32"/>
    <text x="248" y="298" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="800">1</text>
    <text x="248" y="360" text-anchor="middle" fill="#1c3a1c" font-family="sans-serif" font-size="30" font-weight="800">직업</text>
    <text x="248" y="404" text-anchor="middle" fill="#4a6b48" font-family="sans-serif" font-size="18">구체적 직무</text>
    <text x="248" y="452" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">예) 주니어</text>
    <text x="248" y="478" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">브랜드 마케터</text>
  </g>

  <!-- Skills box -->
  <g>
    <rect x="448" y="222" width="304" height="300" rx="20" fill="#e3f1e1" stroke="#388e3c" stroke-width="2.5"/>
    <circle cx="600" cy="286" r="34" fill="#388e3c"/>
    <text x="600" y="298" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="800">2</text>
    <text x="600" y="360" text-anchor="middle" fill="#1c3a1c" font-family="sans-serif" font-size="30" font-weight="800">역량</text>
    <text x="600" y="404" text-anchor="middle" fill="#4a6b48" font-family="sans-serif" font-size="18">직무가 요구하는 능력</text>
    <text x="600" y="452" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">예) 캠페인 1개·GA</text>
    <text x="600" y="478" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">포트폴리오 3개</text>
  </g>

  <!-- Timeline box -->
  <g>
    <rect x="800" y="222" width="304" height="300" rx="20" fill="#dcefda" stroke="#43a047" stroke-width="2.5"/>
    <circle cx="952" cy="286" r="34" fill="#43a047"/>
    <text x="952" y="298" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="800">3</text>
    <text x="952" y="360" text-anchor="middle" fill="#1c3a1c" font-family="sans-serif" font-size="30" font-weight="800">시기</text>
    <text x="952" y="404" text-anchor="middle" fill="#4a6b48" font-family="sans-serif" font-size="18">언제까지 (역산)</text>
    <text x="952" y="452" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">예) 이번 달 GA</text>
    <text x="952" y="478" text-anchor="middle" fill="#607d5e" font-family="sans-serif" font-size="16">12월 포트폴리오</text>
  </g>

  <line x1="404" y1="372" x2="444" y2="372" stroke="#2e7d32" stroke-width="4" marker-end="url(#cvbArrow)"/>
  <line x1="756" y1="372" x2="796" y2="372" stroke="#388e3c" stroke-width="4" marker-end="url(#cvbArrow)"/>

  <text x="600" y="566" text-anchor="middle" fill="#2e7d32" font-family="sans-serif" font-size="20" font-weight="700">VisionDream · 오늘 한 칸만 구체적으로 채워보세요 🌱</text>
</svg>
