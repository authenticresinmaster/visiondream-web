<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="무리 없이 지속되는 하루 시스템: 아침 · 낮 · 저녁 세 구간에 작은 앵커 습관, 비전으로 연결">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">무리 없이 지속되는 하루 시스템</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">아침 · 낮 · 저녁 세 구간에 작은 앵커 습관 하나씩</text>
  <text x="812" y="60" text-anchor="middle" font-family="sans-serif" font-size="30">⚡</text>
  <defs>
    <marker id="gsA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="248" y1="185" x2="312" y2="185" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#gsA)"/>
  <line x1="568" y1="185" x2="632" y2="185" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#gsA)"/>
  <g>
    <rect x="60" y="120" width="180" height="130" rx="16" fill="#d99a00"/>
    <text x="150" y="168" text-anchor="middle" font-family="sans-serif" font-size="34">🌅</text>
    <text x="150" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="800">아침 · 시작 앵커</text>
    <text x="150" y="228" text-anchor="middle" fill="#fff3d6" font-family="sans-serif" font-size="11">물 한 잔 · 오늘 첫 행동 한 줄</text>
  </g>
  <g>
    <rect x="320" y="120" width="180" height="130" rx="16" fill="#105d9e"/>
    <text x="410" y="168" text-anchor="middle" font-family="sans-serif" font-size="34">☀️</text>
    <text x="410" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="800">낮 · 집중 앵커</text>
    <text x="410" y="228" text-anchor="middle" fill="#cfe0f0" font-family="sans-serif" font-size="11">제일 중요한 일 25분 한 블록</text>
  </g>
  <g>
    <rect x="580" y="120" width="180" height="130" rx="16" fill="#1a2332"/>
    <text x="670" y="168" text-anchor="middle" font-family="sans-serif" font-size="34">🌙</text>
    <text x="670" y="206" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="800">저녁 · 마무리 앵커</text>
    <text x="670" y="228" text-anchor="middle" fill="#9db3cc" font-family="sans-serif" font-size="11">오늘 닫기 · 내일 첫 행동 정하기</text>
  </g>
  <g>
    <rect x="60" y="286" width="700" height="52" rx="14" fill="#eef4ec" stroke="#568a35" stroke-width="2"/>
    <text x="90" y="318" font-family="sans-serif" font-size="24">🌱</text>
    <text x="410" y="311" text-anchor="middle" fill="#3c5a24" font-family="sans-serif" font-size="14" font-weight="800">토대 · 비전으로 연결 + 무리 없는 강도(60~70%)</text>
    <text x="410" y="329" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">세 앵커가 다 무너져도, 이 토대 위에서 내일 다시 시작할 수 있습니다</text>
