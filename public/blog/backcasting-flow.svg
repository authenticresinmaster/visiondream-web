<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-label="꿈 역설계: 원하는 미래에서 오늘 할 일까지 거꾸로 설계하는 흐름">
  <rect width="820" height="380" rx="20" fill="#f5f8fb"/>
  <text x="410" y="48" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">꿈 역설계 — 미래에서 오늘로 거꾸로</text>

  <!-- arrow line -->
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/>
    </marker>
  </defs>
  <line x1="120" y1="200" x2="700" y2="200" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- node helper boxes -->
  <!-- 1 future -->
  <g>
    <circle cx="140" cy="200" r="30" fill="#1a2332"/>
    <text x="140" y="207" text-anchor="middle" fill="#ffd700" font-family="sans-serif" font-size="24">🎯</text>
    <text x="140" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">5년 후 미래</text>
    <text x="140" y="284" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">원하는 모습 선언</text>
  </g>
  <!-- 2 vision -->
  <g>
    <circle cx="300" cy="200" r="30" fill="#105d9e"/>
    <text x="300" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="800">비전</text>
    <text x="300" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">비전·꿈</text>
    <text x="300" y="284" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">영역별로 구체화</text>
  </g>
  <!-- 3 goal -->
  <g>
    <circle cx="460" cy="200" r="30" fill="#439ae3"/>
    <text x="460" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="800">목표</text>
    <text x="460" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">3개월 목표</text>
    <text x="460" y="284" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">측정 가능하게</text>
  </g>
  <!-- 4 today -->
  <g>
    <circle cx="620" cy="200" r="30" fill="#568a35"/>
    <text x="620" y="208" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">오늘</text>
    <text x="620" y="262" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="15" font-weight="800">오늘 할 일·습관</text>
    <text x="620" y="284" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="12">매일 한 걸음</text>
  </g>

  <text x="410" y="135" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">① 미래를 먼저 정한다 → ② 거기서 거꾸로 단계를 채운다</text>
  <text x="410" y="345" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="13">백캐스팅(Backcasting): 막연한 미래를 오늘의 실천으로 연결하는 설계법</text>
</svg>
