<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="마음챙김 4단계: 멈춤 · 호흡 · 알아차림 · 비전 재연결">
  <rect width="880" height="400" rx="20" fill="#f5f8fb"/>
  <text x="440" y="46" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="22" font-weight="800">하루 3분 마음챙김</text>
  <text x="440" y="74" text-anchor="middle" fill="#105d9e" font-family="sans-serif" font-size="14" font-weight="700">멈추고 · 숨 쉬고 · 알아차리고 · 다시 비전으로</text>
  <defs>
    <marker id="mfA" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#105d9e"/></marker>
  </defs>
  <line x1="148" y1="210" x2="732" y2="210" stroke="#105d9e" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#mfA)"/>
  <g>
    <circle cx="140" cy="210" r="34" fill="#1a2332"/>
    <text x="140" y="204" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">1</text>
    <text x="140" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="800">멈춤</text>
    <text x="140" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12" font-weight="800">지금 하던 걸</text>
    <text x="140" y="290" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">잠깐 내려놓기</text>
  </g>
  <g>
    <circle cx="330" cy="210" r="34" fill="#105d9e"/>
    <text x="330" y="204" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">2</text>
    <text x="330" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="800">호흡</text>
    <text x="330" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12" font-weight="800">세 번, 천천히</text>
    <text x="330" y="290" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">숨에 집중하기</text>
  </g>
  <g>
    <circle cx="520" cy="210" r="34" fill="#3f7cb3"/>
    <text x="520" y="204" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">3</text>
    <text x="520" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="800">알아차림</text>
    <text x="520" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12" font-weight="800">떠오른 생각을</text>
    <text x="520" y="290" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">판단 없이 바라보기</text>
  </g>
  <g>
    <circle cx="726" cy="210" r="34" fill="#568a35"/>
    <text x="726" y="204" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="800">4</text>
    <text x="726" y="223" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="18" font-weight="800">비전 재연결</text>
    <text x="726" y="272" text-anchor="middle" fill="#1a2332" font-family="sans-serif" font-size="12" font-weight="800">차분해진 마음으로</text>
    <text x="726" y="290" text-anchor="middle" fill="#5b6b82" font-family="sans-serif" font-size="11">다시 목표로 🌱</text>
